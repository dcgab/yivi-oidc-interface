services:
  ory_auth_demo:
    build: ./examples/kratos-yivi/ory_auth_demo
    env_file: ./examples/kratos-yivi/.env
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ORY_SDK_URL=http://host.docker.internal:4433
    networks:
      - yivi-oidc-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
  kratos-migrate:
    image: oryd/kratos:v1.3.0
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes
    env_file: ./examples/kratos-yivi/.env
    environment:
      - DSN=postgres://ory:secret@postgresd_kratos:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4
    restart: on-failure
    volumes:
      - ./examples/kratos-yivi/config/kratos:/etc/config/kratos:ro,z
    depends_on:
      postgresd_kratos:
        condition: service_healthy
        restart: false
    networks:
      - yivi-oidc-network
  kratos-selfservice-ui-node:
    image: oryd/kratos-selfservice-ui-node:v1.3.1
    env_file: ./examples/kratos-yivi/.env
    environment:
      - KRATOS_PUBLIC_URL=http://host.docker.internal:4433
      - KRATOS_BROWSER_URL=http://127.0.0.1:4433/
      - HYDRA_ADMIN_URL=http://hydra:4445/
      - COOKIE_SECRET=changeme
      - CSRF_COOKIE_NAME=ory_csrf_ui
      - CSRF_COOKIE_SECRET=changeme 
      - PORT=4455
      - SECURITY_MODE=
    ports:
      - "4455:4455"
    networks:
      - yivi-oidc-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
  kratos:
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
        restart: false
      postgresd_kratos:
        condition: service_healthy
        restart: false
    image: oryd/kratos:v1.3.1
    env_file: ./examples/kratos-yivi/.env
    network_mode: host
    restart: unless-stopped
    environment:
      - LOG_LEVEL=trace
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - ./examples/kratos-yivi/config/kratos:/etc/config/kratos:ro,z
  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - '4436:4436'
      - '4437:4437'
      - '1025:1025'
    networks:
      - yivi-oidc-network
  postgresd_kratos:
    image: postgres:16.2
    env_file: ./examples/kratos-yivi/.env
    ports:
      - "5433:5432"
    environment: 
      - POSTGRES_USER=ory 
      - POSTGRES_PASSWORD=secret 
      - POSTGRES_DB=kratos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ory -d kratos"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - yivi-oidc-network
    volumes:
      - postgres-kratos-data:/var/lib/postgresql/data
    

networks:
  yivi-oidc-network:
volumes:
  postgres-hydra-data:
  postgres-kratos-data:
