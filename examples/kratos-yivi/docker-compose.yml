services:
  ory_auth_demo:
    build: /home/dennis/internship/yivi-oidc-interface/examples/kratos-yivi/ory_auth_demo
    env_file: /home/dennis/internship/yivi-oidc-interface/examples/kratos-yivi/.env
    ports:
      - "4000:4000" # Public port
    environment:
      - PORT=4000
    networks:
      - yivi-oidc-network
  kratos-migrate:
    image: oryd/kratos:v1.3.0
    # environment:
    #   - DSN=${KRATOS_DSN}
    volumes:
      - type: bind
        source: /home/dennis/internship/yivi-oidc-interface/examples/kratos-yivi/config/kratos
        target: /etc/config/kratos
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes
    env_file: /home/dennis/internship/yivi-oidc-interface/examples/kratos-yivi/.env
    restart: on-failure
    depends_on:
      postgresd_kratos:
        condition: service_started
        restart: false
    networks:
      - yivi-oidc-network
  kratos-selfservice-ui-node:
    image: oryd/kratos-selfservice-ui-node:v1.3.1
    env_file: /home/dennis/internship/yivi-oidc-interface/examples/kratos-yivi/.env
    environment:
      - KRATOS_PUBLIC_URL=http://kratos:4433/
      - KRATOS_BROWSER_URL=http://127.0.0.1:4433/
      - HYDRA_ADMIN_URL=http://hydra:4445/
      - COOKIE_SECRET=changeme
      - CSRF_COOKIE_NAME=ory_csrf_ui
      - CSRF_COOKIE_SECRET=changeme 
      - PORT=4455
      - SECURITY_MODE=
    ports:
      - "4455:4455"
    networks:
      - yivi-oidc-network
    restart: on-failure
  kratos:
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
        restart: false
      postgresd_kratos:
        condition: service_started
        restart: false
    env_file: /home/dennis/internship/yivi-oidc-interface/examples/kratos-yivi/.env
    image: oryd/kratos:v1.3.1
    ports:
      - '4433:4433' # public
      - '4434:4434' # admin
    restart: unless-stopped
    environment:
      - LOG_LEVEL=trace
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - type: bind
        source: /home/dennis/internship/yivi-oidc-interface/examples/kratos-yivi/config/kratos
        target: /etc/config/kratos
    networks:
      - yivi-oidc-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - '4436:4436'
      - '4437:4437'
    networks:
      - yivi-oidc-network
  postgresd_kratos:
    image: postgres:16.2
    env_file: /home/dennis/internship/yivi-oidc-interface/examples/kratos-yivi/.env
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=kratos
    networks:
      - yivi-oidc-network
    volumes:
      - postgres-kratos-data:/var/lib/postgresql/data
    

networks:
  yivi-oidc-network:
volumes:
  postgres-hydra-data:
  postgres-kratos-data: