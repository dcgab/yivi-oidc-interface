version: v0.13.0

dsn: ${KRATOS_DSN}

serve:
  public:
    base_url: ${KRATOS_PUBLIC_URL}
    cors:
      enabled: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: ${KRATOS_DEFAULT_BROWSER_RETURN_URL}
  allowed_return_urls:
    - ${KRATOS_DEFAULT_BROWSER_RETURN_URL}
    - ${KRATOS_UI_PUBLIC_URL}/
    - http://localhost:19006/Callback
    - exp://localhost:8081/--/Callback

  methods:
    password:
      enabled: true
    totp:
      config:
        issuer: Kratos
      enabled: true
    lookup_secret:
      enabled: true
    link:
      enabled: true
    code:
      enabled: true
    oidc:
      config:
        providers:
          - id: linkedin
            provider: generic
            client_id: LINKEDIN_CLIENT_ID_PLACEHOLDER
            client_secret: LINKEDIN_CLIENT_SECRET_PLACEHOLDER
            issuer_url: https://www.linkedin.com/oauth
            mapper_url: "base64:"
            scope:
              - email
              - profile
              - openid
          - id: yivi
            provider: generic
            client_id: ${YIVI_OIDC_CLIENT_ID}
            client_secret: ${YIVI_OIDC_CLIENT_SECRET}
            issuer_url: ${YIVI_OIDC_ISSUER_URL}
            # mapper_url: "base64:"
            mapper_url: "base64:"
            scope:
              - pbdf.sidn-pbdf.email.email
              - pbdf.sidn-pbdf.mobilenumber.mobilenumber
              - pbdf.gemeente.personalData.firstnames
              - pbdf.gemeente.personalData.familyname
              - openid
      enabled: true

  flows:
    error:
      ui_url: ${KRATOS_UI_PUBLIC_URL}/error

    settings:
      ui_url: ${KRATOS_UI_PUBLIC_URL}/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      ui_url: ${KRATOS_UI_PUBLIC_URL}/recovery
      use: code

    verification:
      enabled: true
      ui_url: ${KRATOS_UI_PUBLIC_URL}/verification
      use: code
      after:
        default_browser_return_url: ${KRATOS_UI_PUBLIC_URL}/

    logout:
      after:
        default_browser_return_url: ${KRATOS_UI_PUBLIC_URL}/login

    login:
      ui_url: ${KRATOS_UI_PUBLIC_URL}/login
      lifespan: 10m
      after:
        default_browser_return_url: ${KRATOS_DEFAULT_BROWSER_RETURN_URL}

    registration:
      lifespan: 10m
      ui_url: ${KRATOS_UI_PUBLIC_URL}/registration
      after:
        password:
          hooks:
            - hook: session
            - hook: show_verification_ui
        oidc:
          hooks:
            - hook: session
          default_browser_return_url: ${KRATOS_DEFAULT_BROWSER_RETURN_URL}
        default_browser_return_url: ${KRATOS_DEFAULT_BROWSER_RETURN_URL}

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - ${KRATOS_COOKIE_SECRET}
  cipher:
    - ${KRATOS_CIPHER_SECRET}

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true

feature_flags:
  use_continue_with_transitions: true
