version: v0.13.0

dsn: postgres://ory:secret@postgresd_kratos:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4

serve:
  public:
    base_url: https://demo-app.dennisgabeler.nl/
    cors:
      enabled: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: https://demo-app.dennisgabeler.nl/
  allowed_return_urls:
    - https://demo-app.dennisgabeler.nl
    - https://demo-app.dennisgabeler.nl/ui/
    - http://localhost:19006/Callback
    - exp://localhost:8081/--/Callback

  methods:
    password:
      enabled: true
    totp:
      config:
        issuer: Kratos
      enabled: true
    lookup_secret:
      enabled: true
    link:
      enabled: true
    code:
      enabled: true
    oidc:
      config:
        providers:
          - id: linkedin
            provider: generic
            client_id: 78y8yopnonfa3n
            client_secret: MHrQ5iBF110wCoJr
            issuer_url: https://www.linkedin.com/oauth
            mapper_url: "base64:"
            scope:
              - email
              - profile
              - openid
          - id: yivi
            provider: generic
            client_id: 3a01b26f-8174-493b-a55b-9f067c916d74
            client_secret: Cr4~OQojVPP0b6GH3EMAUY9EqE
            issuer_url: https://oidc.dennisgabeler.nl/
            # mapper_url: "base64:"
            mapper_url: "base64:"
            scope:
              - pbdf.sidn-pbdf.email.email
              - pbdf.sidn-pbdf.mobilenumber.mobilenumber
              - pbdf.gemeente.personalData.firstnames
              - pbdf.gemeente.personalData.familyname
              - openid
      enabled: true

  flows:
    error:
      ui_url: https://demo-app.dennisgabeler.nl/ui/error

    settings:
      ui_url: https://demo-app.dennisgabeler.nl/ui/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      ui_url: https://demo-app.dennisgabeler.nl/ui/recovery
      use: code

    verification:
      enabled: true
      ui_url: https://demo-app.dennisgabeler.nl/ui/verification
      use: code
      after:
        default_browser_return_url: https://demo-app.dennisgabeler.nl/ui/

    logout:
      after:
        default_browser_return_url: https://demo-app.dennisgabeler.nl/ui/login

    login:
      ui_url: https://demo-app.dennisgabeler.nl/ui/login
      lifespan: 10m
      after:
        default_browser_return_url: https://demo-app.dennisgabeler.nl?from=login

    registration:
      lifespan: 10m
      ui_url: https://demo-app.dennisgabeler.nl/ui/registration
      after:
        password:
          hooks:
            - hook: session
            - hook: show_verification_ui
        default_browser_return_url: https://demo-app.dennisgabeler.nl?from=registration

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true

feature_flags:
  use_continue_with_transitions: true
