serve:
  # public:
  #   cors: 
  #     enabled: true
  cookies:
    same_site_mode: Lax

urls:
  self:
    issuer: http://hydra:4444 # Used for server-to-server communication (can be docker hostname)
    public: http://127.0.0.1:4444/ # Used for browser-toserver communication (must be public reachable url)
    admin: http://hydra:4445/ # Used for admin communication (can be docker hostname)
  consent: http://127.0.0.1:3000/consent
  login: http://127.0.0.1:3000/login
  logout: http://127.0.0.1:3000/logout

webfinger:
  oidc_discovery:
    # token_url: http://hydra:4444/oauth2/token
    token_url: http://host.docker.internal:4444/oauth2/token
    supported_claims:
      - email # email scope
      - name # profile scope
    supported_scope:
      - email
      - profile
    # auth_url: http://hydra:4444/oauth2/auth

oauth2:
  expose_internal_errors: true

secrets:
  system:
    - youReallyNeedToChangeThis

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
    pairwise:
      salt: youReallyNeedToChangeThis
  

dsn: postgres://hydra:secret@postgresd:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4