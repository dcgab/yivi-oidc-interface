# include:
#   - ../vendor/irmago/docker-compose.yml
services:
  yivi_consent_node:
    build: /home/dennis/internship/yivi-oidc-interface/yivi-consent-node/.
    env_file: /home/dennis/internship/yivi-oidc-interface/yivi-consent-node/.env
    ports: 
      - 3000:3000
    networks:
      - yivi-oidc-network
  irma_server:
    image: ghcr.io/privacybydesign/irma:latest
    command: server --verbose --jwt-privkey-file /irmago/config/private.pem --url "http://145.116.167.128:port"
    ports:
      - 8088:8088
    volumes:
      - type: bind
        source: /home/dennis/internship/yivi-oidc-interface/yivi-consent-node/config/yivi
        target: /irmago/config
    networks:
      - yivi-oidc-network
  hydra:
    image: oryd/hydra:v2.3.0
    ports:
      - "4444:4444" # Public port
      - "4445:4445" # Admin port
      - "5555:5555" # Port for hydra token user
    # command: serve -c /etc/config/hydra/hydra.yml all --dev
    command: serve -c /etc/config/hydra/hydra.yml all --dev
    volumes:
      - type: bind
        source: /home/dennis/internship/yivi-oidc-interface/yivi-consent-node/config/hydra
        target: /etc/config/hydra
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
        restart: false
      postgresd_hydra:
        condition: service_started
        restart: false
    networks:
      - yivi-oidc-network
  hydra-migrate:
    image: oryd/hydra:v2.3.0
    command: migrate -c /etc/config/hydra/hydra.yml sql -e --yes
    restart: on-failure
    networks:
      - yivi-oidc-network
    volumes:
      - type: bind
        source: ./config/hydra
        target: /etc/config/hydra
    depends_on:
      postgresd_hydra:
        condition: service_started
        restart: false
  postgresd_hydra:
      image: postgres:16.3
      ports:
        - "5432:5432"
      environment:
        - POSTGRES_DB=hydra
      volumes:
        - postgres-hydra-data:/var/lib/postgresql/data
      networks:
        - yivi-oidc-network
volumes:
  postgres-hydra-data:
networks:
  yivi-oidc-network: